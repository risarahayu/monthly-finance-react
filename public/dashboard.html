<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="wrapper">

        <div id="loading" class="loading">⏳ Loading...</div>
        <div id="error" class="error"></div>

        <!-- Header -->
        <div class="header">
            <h2>Summary Dashboard</h2>

            <a href="/" class="back-link add-btn">
                + Add New Transaction
            </a>
        </div>

        <!-- Filter -->
        <div class="filter-section">

            <h3>Filter Transaction</h3>

            <form id="filterForm" class="form-grid">

                <div class="form-group">
                    <label for="month">Month</label>

                    <select id="month" name="month">
                        <option value="">All</option>
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="year">Year</label>

                    <select id="year" name="year">
                        <option value="2026">2026</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">
                    Apply Filter
                </button>

            </form>

        </div>

        <!-- Summary Cards -->
        <div class="container">

            <div class="card income-card">
                <div class="title">Total Income</div>
                <div class="value" id="income">Rp 0</div>
            </div>

            <div class="card expense-card">
                <div class="title">Total Expense</div>
                <div class="value" id="expense">Rp 0</div>
            </div>

            <div class="card balance-card">
                <div class="title">Balance</div>
                <div class="value" id="balance">Rp 0</div>
            </div>

        </div>

        <!-- Chart -->
        <h3 class="section-title">
            Expense by Category
        </h3>

        <div class="chart-card">
            <canvas id="expenseChart"></canvas>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/dashboard.js"></script>

</body>
</html>
